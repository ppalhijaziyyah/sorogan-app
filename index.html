<!DOCTYPE html>
<html lang="id" class=""> <!-- Kelas 'dark' akan ditambahkan di sini oleh JS -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorogan App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;700&family=Inter:wght@400;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hurricane&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/src/style.css">
</head>

<body class="flex flex-col min-h-screen">

    <div id="loader-overlay"
        class="fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center z-50 hidden">
        <div class="spinner h-16 w-16 border-4 border-gray-300 rounded-full"></div>
    </div>

    <div id="error-container"
        class="hidden fixed top-5 left-1/2 -translate-x-1/2 bg-red-500 text-white py-3 px-6 rounded-lg shadow-lg z-50">
        <p id="error-message"></p>
    </div>

    <div class="container mx-auto p-4 md:p-8 max-w-5xl flex-grow">
        <div id="home-page">
            <header class="text-center mb-4">
                <h1 class="text-6xl font-semibold bg-clip-text text-transparent title-font mb-2 pb-2"
                    style="background-image: var(--accent-gradient)">Sorogan</h1>
                <p class="text-lg mb-4">Belajar Membaca dan Memahami Teks Arab Gundul</p>
                <hr class="border-gray-300 dark:border-gray-700">
                <p class="text-sm mt-4">Pilih Teks untuk Mulai Belajar</p>
            </header>
            <div id="filter-container" class="flex justify-center flex-wrap gap-3 mb-8"></div>
            <div id="lesson-groups-container" class="space-y-12"></div>
        </div>

        <div id="learning-page" class="hidden"></div>
    </div>

    <div id="bottom-slider-backdrop" class="fixed inset-0 bg-black bg-opacity-50 hidden opacity-0 z-40"></div>
    <div id="bottom-slider"
        class="fixed bottom-0 left-0 right-0 card-glass rounded-t-2xl shadow-2xl p-6 transform translate-y-full z-50 flex flex-col">
        <div class="flex-shrink-0 flex justify-between items-center mb-4">
            <h3 id="slider-title" class="text-xl font-bold text-teal-600 dark:text-teal-400 arabic-font"></h3>
            <button id="close-slider-btn"
                class="text-gray-500 hover:text-gray-800 dark:hover:text-gray-200 text-2xl">&times;</button>
        </div>
        <div id="slider-content" class="flex-grow overflow-y-auto" dir="ltr"></div>
    </div>

    <div id="confirmation-modal"
        class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-2xl max-w-sm w-full p-6 text-center">
            <h3 class="text-xl font-bold mb-4">Konfirmasi</h3>
            <p id="modal-message" class="text-gray-700 dark:text-gray-300 mb-6">Apakah Anda yakin?</p>
            <div class="flex justify-center gap-4">
                <button id="modal-cancel-btn"
                    class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-6 rounded-lg">Batal</button>
                <button id="modal-confirm-btn"
                    class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded-lg">Yakin</button>
            </div>
        </div>
    </div>

    <!-- FITUR BARU: Tombol Scroll-to-Top -->
    <button id="scroll-to-top-btn" title="Kembali ke Atas"
        class="fixed bottom-8 right-8 bg-teal-500 hover:bg-teal-600 text-white p-3 rounded-full shadow-lg opacity-0 transform translate-y-12 transition-all duration-300 ease-in-out z-30">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"
            stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7" />
        </svg>
    </button>

    <footer class="bg-white/50 dark mt-12 shadow-inner backdrop-blur-sm">
        <div class="container mx-auto py-8 px-4">
            <div class="flex flex-col md:flex-row justify-between items-center gap-8 text-center md:text-left">
                <div>
                    <h3 class="text-4xl bg-clip-text text-transparent title-font"
                        style="background-image: var(--accent-gradient)">Sorogan</h3>
                    <p class="mt-2 text-gray-600 dark:text-gray-300 text-sm">Platform interaktif untuk belajar membaca dan memahami teks Arab gundul.</p>
                </div>
                <div class="flex flex-col items-center gap-4">
                    <div class="flex flex-wrap justify-center items-center gap-x-6 gap-y-2 text-sm text-gray-600 dark:text-gray-300">
                        <button id="about-us-btn" class="hover:text-teal-500 dark:hover:text-teal-400">Tentang Kami</button>
                        <button id="support-us-btn" class="hover:text-teal-500 dark:hover:text-teal-400">Dukung Kami</button>
                        <button id="reset-progress-btn"
                            class="hover:text-red-500 dark:hover:text-red-400">Reset Progres</button>
                    </div>
                    <button id="theme-toggle-btn" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 mt-2 md:mt-0">
                        <svg id="theme-icon-light" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                        </svg>
                        <svg id="theme-icon-dark" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                        </svg>
                    </button>
                </div>
            </div>
            <div class="border-t border-gray-300 dark:border-gray-700 mt-8 pt-6 text-center text-gray-500 dark:text-gray-400 text-sm">
                &copy; 2025 Sorogan App. Dibuat dengan Gemini.
            </div>
        </div>
    </footer>


    <script type="module" src="/src/js/main.js"></script>
</body>

</html>
